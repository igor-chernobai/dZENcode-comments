services:
  db:
    image: postgres:16
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file: .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7.4.0
    restart: always
    depends_on:
      db:
        condition: service_healthy

  web:
    build: .
    command: gunicorn core.asgi:application -k uvicorn.workers.UvicornWorker -b 0.0.0.0:8000
    env_file: .env
    volumes:
      - ./:/usr/src/app
      - static_volume:/usr/src/app/staticfiles
      - media_volume:/usr/src/app/media
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
    restart: always

  worker:
    build: .
    command: celery -A core worker --loglevel=INFO
    env_file: .env
    volumes:
      - ./:/usr/src/app
      - media_volume:/usr/src/app/media
    depends_on:
      redis:
        condition: service_started
      db:
        condition: service_healthy
    restart: always

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/usr/src/app/staticfiles:ro
      - media_volume:/usr/src/app/media:ro
    depends_on:
      - web
    restart: always

volumes:
  postgres_data:
  static_volume:
  media_volume: