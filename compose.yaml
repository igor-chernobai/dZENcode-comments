services:
  db:
    image: postgres:16
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    env_file:
      - .env
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5


  redis:
    image: redis:7.4.0
    ports:
      - "6379:6379"
    depends_on:
      - db

  web:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./:/usr/src/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy

    restart: always

volumes:
  postgres_data: